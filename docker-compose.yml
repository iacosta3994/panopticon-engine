version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: panopticon-db
    environment:
      POSTGRES_USER: panopticon
      POSTGRES_PASSWORD: panopticon_password
      POSTGRES_DB: panopticon_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panopticon"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panopticon-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://panopticon:panopticon_password@postgres:5432/panopticon_engine
      PORT: 3000
      API_PORT: 3001
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panopticon-scheduler
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://panopticon:panopticon_password@postgres:5432/panopticon_engine
    command: node dist/jobs/JobScheduler.js
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
